name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # The unit tests cover pure logic (metrics, backtest folds, feature
      # leakage guard, newsvendor + A/B stats) -- they need only the light deps,
      # so CI stays fast (no torch/lightgbm download).
      - run: pip install numpy pandas scipy pytest
      - run: pytest -q
