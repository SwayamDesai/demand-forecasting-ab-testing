name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # The unit tests (metrics + the no-future-leakage feature guard) only need
      # numpy + pandas, so we install a minimal set for a fast, reliable CI run.
      # Heavy deps (torch, lightgbm, statsforecast) are exercised by the pipeline
      # scripts, not by pytest.
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "numpy>=1.26" "pandas>=2.2" "pytest>=8.0"

      - name: Run tests
        run: pytest -q
